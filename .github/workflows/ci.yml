name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Validate package.json (pi package manifest)
        run: |
          node -e '
            const pkg = require("./package.json");
            const required = ["name", "version", "pi"];
            required.forEach(key => {
              if (!pkg[key]) {
                console.error(`❌ Missing required field: ${key}`);
                process.exit(1);
              }
            });
            if (!pkg.pi.extensions || !Array.isArray(pkg.pi.extensions)) {
              console.error("❌ pi.extensions must be an array");
              process.exit(1);
            }
            console.log("✅ package.json is valid for a pi package");
          '

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Verify main extension entrypoint
        run: |
          if [ ! -f "index.ts" ]; then
            echo "❌ index.ts is missing"
            exit 1
          fi
          echo "✅ index.ts found"

      - name: Success
        run: echo "✅ CI passed on Node ${{ matrix.node-version }}"
