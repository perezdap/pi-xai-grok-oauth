# Configuration for GitHub Releases (used by the Release workflow)

changelog:
  exclude:
    labels:
      - duplicate
      - question
      - invalid
      - wontfix
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📝 Documentation
      labels:
        - documentation
        - docs
    - title: 🛠️ Maintenance
      labels:
        - chore
        - refactor
        - ci
        - build
    - title: 📦 Other Changes
      labels:
        - "*"
